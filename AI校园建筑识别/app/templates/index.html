<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI校园建筑识别</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 1200px;
        }
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }
        .video-feed {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .result-container {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0069d9;
        }
        .btn-secondary {
            background-color: #6c757d;
            border: none;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        .garbage-guide {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-top: 20px;
        }
        .garbage-item {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
        }
        .recyclable {
            background-color: #e3f2fd;
            border-left: 4px solid #2196f3;
        }
        .kitchen {
            background-color: #e8f5e8;
            border-left: 4px solid #4caf50;
        }
        .hazardous {
            background-color: #ffebee;
            border-left: 4px solid #f44336;
        }
        .other {
            background-color: #f5f5f5;
            border-left: 4px solid #9e9e9e;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-5">AI校园建筑识别系统</h1>
        
        <div class="video-container">
            <img src="{{ url_for('video_feed') }}" class="video-feed" alt="实时视频">
        </div>
        
        <div class="d-flex justify-content-center mt-4">
            <button class="btn btn-primary mx-2" onclick="startCamera()">开始识别</button>
            <button class="btn btn-secondary mx-2" onclick="stopCamera()">停止识别</button>
            <button class="btn btn-outline-primary mx-2" onclick="switchCamera()">切换摄像头</button>
        </div>
        
        <div class="result-container">
            <h2 class="h4 mb-3">识别结果</h2>
            <div id="detection-results">
                <p class="text-muted">等待识别...</p>
            </div>
        </div>
        
        <div class="garbage-guide">
            <h2 class="h4 mb-3">垃圾分类指南</h2>
            <div class="recyclable garbage-item">
                <strong>可回收垃圾</strong>：纸张、塑料、玻璃、金属、布料等
            </div>
            <div class="kitchen garbage-item">
                <strong>厨余垃圾</strong>：剩菜剩饭、果皮、蔬菜叶等
            </div>
            <div class="hazardous garbage-item">
                <strong>有害垃圾</strong>：电池、灯管、药品、油漆等
            </div>
            <div class="other garbage-item">
                <strong>其他垃圾</strong>：烟头、纸巾、陶瓷、渣土等
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let videoRunning = true;
        
        function startCamera() {
            videoRunning = true;
            document.getElementById('detection-results').innerHTML = '<p class="text-muted">正在识别...</p>';
        }
        
        function stopCamera() {
            videoRunning = false;
            document.getElementById('detection-results').innerHTML = '<p class="text-muted">已停止识别</p>';
        }
        
        function switchCamera() {
            // 切换摄像头功能
            alert('摄像头切换功能开发中');
        }
        
        // 模拟实时更新识别结果
        setInterval(() => {
            if (videoRunning) {
                // 实际项目中，这里应该通过API获取识别结果
                const mockResults = [
                    { class_name: '教学楼', confidence: 0.95, suggestion: '' },
                    { class_name: '可回收垃圾', confidence: 0.88, suggestion: '可回收垃圾：建议投放到蓝色垃圾桶' }
                ];
                
                let resultsHtml = '';
                mockResults.forEach(result => {
                    resultsHtml += `
                        <div class="mb-2 p-2 border rounded">
                            <strong>${result.class_name}</strong> (${(result.confidence * 100).toFixed(1)}%)
                            ${result.suggestion ? `<p class="text-sm text-muted">${result.suggestion}</p>` : ''}
                        </div>
                    `;
                });
                
                document.getElementById('detection-results').innerHTML = resultsHtml || '<p class="text-muted">未检测到物体</p>';
            }
        }, 2000);
    </script>
</body>
</html>
